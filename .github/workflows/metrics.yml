name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1: Statistik Utama GitHub & Bahasa
      - name: GitHub Main Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-metrics.svg
          base: header, community, repositories, metadata
          config_timezone: Asia/Jakarta
          
          # Plugin Tambahan
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: yes
          plugin_languages_sections: most-used
          plugin_languages_details: percentage
          config_order: base.header, isocalendar, languages, base.repositories

      # 2: Khusus AniList (File Terpisah)
      - name: AniList Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-anilist.svg
          base: "" # Kosongkan base agar tidak muncul header GitHub lagi
          
          # Konfigurasi AniList
          plugin_anilist: yes
          plugin_anilist_user: cellin
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites, watching
          plugin_anilist_limit: 3
