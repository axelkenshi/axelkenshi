name: GitHub Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      # 1. Header & Kalender Isometrik
      - name: GitHub Main Stats
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-metrics.svg
          base: header, community, repositories, metadata
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          config_timezone: Asia/Jakarta

      # 2. Languages Activity (Detail)
      - name: Detailed Languages
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-languages.svg
          base: ""
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_details: percentage
          plugin_languages_sections: most-used
          plugin_languages_limit: 8

      # 3. Achievements (Medali/Piala)
      - name: Achievements
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-achievements.svg
          base: ""
          plugin_achievements: yes
          plugin_achievements_display: compact # atau 'detailed'
          plugin_achievements_threshold: B # Hanya tampilkan rank C ke atas
          plugin_achievements_secrets: yes # Menampilkan achievement tersembunyi
          plugin_achievements_limit: 10    # Batasi agar tidak overload

      # 4. Featured Repositories & Starred Topics
      - name: Featured & Topics
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-featured.svg
          base: ""
          # Featured Repositories (Repo yang di-pin)
          plugin_repositories: yes
          plugin_repositories_featured: axelkenshi/bigbites-v2 # Masukkan repo unggulan Anda
          # Starred Topics dengan Ikon
          plugin_topics: yes
          plugin_topics_limit: 10
          plugin_topics_mode: icons # Menampilkan ikon topik
          plugin_topics_sort: stars

      # 5. Khusus AniList
      - name: AniList Activity
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: axelkenshi
          template: classic
          filename: github-anilist.svg
          base: ""
          plugin_anilist: yes
          plugin_anilist_user: cellin
          plugin_anilist_medias: anime
          plugin_anilist_sections: favorites, watching
          plugin_anilist_limit: 5
